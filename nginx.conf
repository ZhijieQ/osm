server {
    listen 80;
    server_name localhost;

    # 1. 静态资源 (Styles, Fonts, Sprites)
    location ^~ /styles/ {
        alias /usr/share/nginx/data/styles/; 
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    location ^~ /fonts/ {
        alias /usr/share/nginx/data/fonts/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    location ^~ /sprites/ {
        alias /usr/share/nginx/data/sprites/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    # 2. Web 界面
    location /web/ {
        alias /usr/share/nginx/data/www/; 
        index test.html;
    }

    # 3. Photon 地理编码/搜索 API
    location /api/ {
        # # Token 校验
        # if ($arg_token != "my_secret_key") {
        #     return 403 "Forbidden: Invalid Token";
        # }

        # 转发到 Photon 容器 (K8s 中为 localhost, Docker 中根据 network_mode 决定)
        proxy_pass http://127.0.0.1:2322/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 4. Martin TileServer (核心代理与认证)
    location / {
        # 跨域预检处理
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # # Token 校验
        # if ($arg_token != "my_secret_key") {
        #     return 403 "Forbidden: Invalid Token";
        # }

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header X-Rewrite-URL $request_uri;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}