server {
    listen 80;
    server_name localhost;

    # 允许跨域请求 (CORS)，这是前端 MapLibre/Mapbox 调用的必须条件
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, OPTIONS';

    location / {
        # 处理 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            return 204;
        }

        # --- 核心认证逻辑 ---
        # 这里的 "my_secret_key" 就是你的密码，你可以自己修改
        if ($arg_token != "my_secret_key") {
            return 403 "Forbidden: Invalid API Token\n";
        }

        # 代理到后端的 Martin 瓦片服务器
        proxy_pass http://tileserver:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}