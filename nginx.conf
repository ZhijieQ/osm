server {
    listen 80;
    server_name localhost;

    # 注意：根据你的 YAML，所有的文件都在 /usr/share/nginx/data/ 目录下
    # 假设你的 NAS 结构是 map_data/styles, map_data/fonts 等

    # 1. 静态资源：路径全部指向新的挂载点 /usr/share/nginx/data/
    location ^~ /styles/ {
        # 如果 NAS 路径是 map_data/styles，这里就写 /usr/share/nginx/data/styles/
        alias /usr/share/nginx/data/styles/; 
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    location ^~ /fonts/ {
        alias /usr/share/nginx/data/fonts/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    location ^~ /sprites/ {
        alias /usr/share/nginx/data/sprites/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    # 2. Web 界面
    location /web/ {
        # 指向 NAS 里的 www 或 html 目录
        # 假设你在 map_data 目录下有个 www 文件夹存放 test.html
        alias /usr/share/nginx/data/www/; 
        index test.html;
    }

    # 3. 核心代理与认证 (Martin TileServer)
    location / {
        # 跨域预检处理
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Token 校验逻辑
        if ($arg_token != "my_secret_key") {
            return 403 "Forbidden: Invalid Token";
        }

        # 反向代理到同一个 Pod 里的 Martin 容器 (localhost:3000)
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 强制让 Martin 知道外部是 HTTPS
        proxy_set_header X-Forwarded-Proto https; 
        
        # 解决重定向可能产生的协议降级问题
        proxy_redirect http:// https://;
    }
}