server {
    listen 80;
    server_name localhost;

    # 1. 静态资源：确保路径正确，使用 ^~ 确保优先级
    location ^~ /styles/ {
        alias /usr/share/nginx/styles/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    location ^~ /fonts/ {
        alias /usr/share/nginx/fonts/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    location ^~ /sprites/ {
        alias /usr/share/nginx/sprites/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex on;
    }

    # 2. Web 界面
    location /web/ {
        alias /usr/share/nginx/html/;
        index test.html;
    }

    # 3. 核心代理与认证 (放在最后)
    location / {
        # 如果是访问根目录下的其他静态文件，或者是 Martin 代理
        if ($arg_token != "my_secret_key") {
            # 只有在不是 OPTIONS 请求时才拦截（防止跨域预检失败）
            set $auth_check "need_token";
        }
        if ($request_method = 'OPTIONS') {
            set $auth_check "is_options";
        }
        
        # 具体的 OPTIONS 处理和 Token 逻辑...
        # (保持你原有的逻辑即可)

        proxy_pass http://127.0.0.1:3000;
        # ... 其他 proxy 配合 ...
    }
}