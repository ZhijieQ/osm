server {
    listen 80;
    server_name localhost;

    # --- 静态文件支持 (解决 file:// 跨域问题) ---
    # 你可以将 test.html 放在宿主机的 ./map_data/www 目录下
    # 然后挂载到容器的 /usr/share/nginx/html
    location /web/ {
        alias /usr/share/nginx/html/;
        index test.html;
    }

    location /fonts/ {
        alias /usr/share/nginx/fonts/;
        # 字体文件也需要支持跨域，否则 MapLibre 无法读取
        add_header 'Access-Control-Allow-Origin' '*';
        autoindex on; # 方便调试，可以看到文件列表
    }

    location / {
        # --- 核心认证逻辑 ---
        if ($arg_token != "my_secret_key") {
            return 403 "Forbidden: Invalid API Token\n";
        }

        # --- 处理 OPTIONS 预检请求 ---
        # 预检请求不需要 token，且需要明确返回允许跨域
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # --- 代理到 Martin ---
        proxy_pass http://tileserver:3000;
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 重要：因为 Martin v1.4.0 已经发了 Access-Control-Allow-Origin: *
        # 这里绝对不要再写 add_header Access-Control-Allow-Origin *;
        # 否则浏览器会因为 Header 重复而报错
    }
}