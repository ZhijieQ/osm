<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Martin 离线矢量地图 - 修复版</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background-color: #f0f0f0; }
    </style>
</head>
<body>
    <div id="map"></div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: {
            "version": 8,
            "glyphs": "https://osm.zhijie.win/fonts/{fontstack}/{range}.pbf",
            "sources": {
                "martin-source": {
                    "type": "vector",
                    "url": "https://osm.zhijie.win/combined?token=my_secret_key"
                }
            },
            "layers": [
                {
                    "id": "background",
                    "type": "background",
                    "paint": { "background-color": "#ede7e1" }
                },
                {
                    "id": "water",
                    "type": "fill",
                    "source": "martin-source",
                    "source-layer": "water",
                    "paint": { "fill-color": "#a2d2e2" }
                },
                {
                    "id": "buildings",
                    "type": "fill",
                    "source": "martin-source",
                    "source-layer": "building",
                    "paint": { "fill-color": "#d6d6d6" }
                },
                {
                    "id": "roads",
                    "type": "line",
                    "source": "martin-source",
                    "source-layer": "transportation",
                    "paint": { "line-color": "#ffffff", "line-width": 2 }
                },
                // --- 道路名称图层 (修正位置) ---
                {
                    "id": "road-labels",
                    "type": "symbol",
                    "source": "martin-source",
                    // --- 关键修改：从 transportation 改为 transportation_name ---
                    "source-layer": "transportation_name", 
                    "layout": {
                        // 优先显示中文名，如果没有则显示英文名，再没有就显示默认 name
                        "text-field": [
                            "coalesce", 
                            ["get", "name:zh"], 
                            ["get", "name:en"], 
                            ["get", "name"]
                        ],
                        "text-font": ["Noto Sans Regular"], 
                        "text-size": [
                            "interpolate", ["linear"], ["zoom"],
                            13, 11,
                            18, 15
                        ],
                        "symbol-placement": "line", // 文字沿线路排列
                        "text-rotation-alignment": "map",
                        "text-pitch-alignment": "viewport",
                        "text-max-angle": 30
                    },
                    "paint": {
                        "text-color": "#333333",
                        "text-halo-color": "#ffffff",
                        "text-halo-width": 1.5
                    }
                }
            ]
        },
        center: [-3.634149, 40.560118],
        zoom: 14.5
    });

    map.on('error', (e) => {
        console.error('MapLibre Error:', e.error ? e.error.message : e);
    });
</script>
</body>
</html>
